[mgr]
ratio = [2, 5, 4]

[opener]
default-app = [
  { run = 'open "$@"', desc = "Default App", orphan = true, for = "macos" },
]
preview-app = [
  { run = 'open -a Preview "$@"', desc = "Preview", orphan = true, for = "macos" },
]
finder = [
  { run = 'open -R "$1"', desc = "Finder", orphan = true, for = "macos" },
]
[[opener.bulk-rename]]
run = "vim %s"
block = true

[open]
prepend_rules = [
  { mime = "text/*", use = ["bulk-rename"] },
  { url = "*", use = ["default-app", "preview-app", "finder"] },
]
