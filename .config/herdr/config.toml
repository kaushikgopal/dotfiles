[keys]
prefix = "f8"
rename_tab = "prefix+comma"
rename_workspace = "prefix+shift+comma"

# prefix-free direct chords (ctrl+alt is safe across Ghostty/iTerm2/Kitty/WezTerm)
focus_pane_left  = ["prefix+h", "ctrl+alt+h"]
focus_pane_down  = ["prefix+j", "ctrl+alt+j"]
focus_pane_up    = ["prefix+k", "ctrl+alt+k"]
focus_pane_right = ["prefix+l", "ctrl+alt+l"]
new_tab          = ["prefix+c", "ctrl+alt+c"]
split_vertical   = ["prefix+v", "ctrl+alt+d"]
split_horizontal = ["prefix+minus", "ctrl+alt+shift+d"]
zoom             = ["prefix+z", "ctrl+alt+z"]

[[keys.command]]
key = "prefix+shift+g"
type = "pane"
command = "lazygit"
description = "lazygit"

[ui]
agent_panel_sort = "priority"
accent = "#326FD6"

# send desktop notifications through Ghostty's escape sequences
[ui.toast]
delivery = "terminal"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"
