# Kaush's tmux configuration
# https://kau.sh

# reload tmux configuration (overrides default `r` binding; shows a confirmation message)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux.conf"

# switch prefix key from Ctrl B → Ctrl A
# Disable tmux's default prefix (C-b).
unbind C-b
set -g prefix C-a
# With prefix set to C-a, allow C-a C-a to send a literal C-a to the program.
bind C-a send-prefix


set-window-option -g mode-keys vi

# Use fish as the default login shell for new windows (leave default-command empty).
set -g default-shell    /opt/homebrew/bin/fish

# Setting this to 0 can make tmux feel more responsive, but may break Alt/Meta keybindings in some terminals.
# set-option -sg escape-time 0
set-option -g history-limit 5000
set-option -g repeat-time 1200   # longer window for repeatable (-r) bindings (default: 500ms)

# Notify when background work produces output (activity) or explicitly rings a bell.
# - Activity covers builds/tests that print output in another window.
# - Bell covers commands that end with `printf '\a'` (or similar).
set-window-option -g monitor-activity on
# Enable bell monitoring so `visual-bell`/`bell-action` settings apply.
set-window-option -g monitor-bell on
set-option -g visual-activity on
set-option -g activity-action other

set-option -g visual-bell on
set-option -g bell-action other

# Keep tmux alerts/messages visible slightly longer (milliseconds).
set-option -g display-time 1000

# automatically rename tmux-window to current path
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# reindex windows when one is closed (no gaps)
set -g renumber-windows on

# interpret mouse gestures properly
# Enable mouse for resizing/selecting panes (this single setting is enough).
# Note: with mouse on, tmux captures all clicks. To open a URL in Ghostty,
# use Cmd+Shift+Click — Shift escapes tmux's mouse capture back to Ghostty.
# Cmd+Click alone won't work and is not planned (ghostty issue #11573).
set -g mouse on
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"


# ------------------------------------
# Theme (swap this path to change themes)
source-file ~/.config/tmux/theme.conf

set-window-option -g window-status-separator '  '
set-window-option -g window-status-activity-style 'underscore'
set-window-option -g window-status-bell-style 'underscore'

# True color (24-bit RGB) support
set -g default-terminal "tmux-256color"
# Extended key support: parse CSI-u sequences from outer terminal (e.g. Shift+Enter as S-Enter)
# and forward them to inner apps that request extended key mode.
set -g extended-keys on
set -g extended-keys-format csi-u
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,ghostty:RGB:extkeys:hyperlinks,xterm-ghostty:RGB:extkeys:hyperlinks,xterm-256color:RGB"

# Allow OSC 8 hyperlink escape sequences (and other OSC sequences) from programs
# running inside tmux to pass through to the outer terminal (Ghostty).
# Without this, Ghostty never receives the hyperlink metadata and shows plain text.
# Requires tmux 3.3+.
set -g allow-passthrough on

set-option -g status-right-length 80
set-option -g status-left-length 60

# move status bar to top
set-option -g status-position top

# ------------------------------------
# rebinding common commands

# Open new windows in the current pane's working directory.
bind c new-window -c "#{pane_current_path}"

# Split new panes in the current pane's working directory (| = vertical, - = horizontal).
bind | split-window -h -c "#{pane_current_path}"
bind V split-window -h -c "#{pane_current_path}"      # alias for |
bind - split-window -v -c "#{pane_current_path}"
bind S split-window -v -c "#{pane_current_path}"      # alias for -
unbind '"'                                             # replace default horizontal split
unbind %                                               # replace default vertical split

# Make resize bindings repeatable (press prefix once, then hold the key).
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# rename pane (prefix + < — mirrors prefix + , for windows)
bind < command-prompt -p "Pane name:" "set-option -p @pane_name '%%'"

# swap current window with target (overrides default move-window on .)
bind . command-prompt -T target "swap-window -t '%%'"

# kill pane/window without confirmation
bind x kill-pane
bind & kill-window

# cycle windows (n/p) and sessions (N/P) — repeatable
bind -r n next-window
bind -r p previous-window
bind -r N switch-client -n
bind -r P switch-client -p

# when a session is destroyed, switch to another instead of detaching
set -g detach-on-destroy off

# Shift+Enter: send ESC+Enter so Claude Code recognizes it as shift+enter in tmux.
# tmux's extended-keys would natively send \x1b[13;2u (CSI-u), which pi handles,
# but Claude Code's Node.js readline parser doesn't understand CSI-u — it needs
# \x1b\r (legacy Meta encoding). This binding intercepts before extended-keys,
# so pi sees \x1b\r as alt+enter; pi's keybindings.json maps alt+enter → newLine.
bind -T root S-Enter send-keys Escape Enter

# Cross-session "go back" — jump to last active pane regardless of session
#
# pane-focus-out fires whenever a pane loses focus, recording its ID.
# The binding resolves the owning session from that ID, switches to it,
# then selects the pane — giving a reliable back/toggle across sessions.
set-hook -g pane-focus-out 'set -g @last_pane "#{pane_id}"'

bind Tab run-shell "\
  last=\$(tmux show-option -gqv @last_pane); \
  [ -n \"\$last\" ] || exit 0; \
  sess=\$(tmux list-panes -a -F '#{pane_id} #{session_name}' | awk -v id=\"\$last\" '\$1==id{print \$2}'); \
  tmux switch-client -t \"\$sess\"; \
  tmux select-pane -t \"\$last\""

# choose-tree with dimmer window names (sessions stay bright)
# note: tree prefix (-> + 0:) is rendered by tmux separately, color only affects description
bind w choose-tree -Zw -F '#{?window_format,#[fg=brightblack]#{window_name}#{window_flags}: "#{pane_title}"  #{pane_current_path},#{session_windows} windows#{?session_attached, (attached),}}'
# prefix + s: fzf session/window chooser with preview
bind s run-shell "tmux display-popup -E -w 80% -h 70% '$XDG_BIN_HOME/tmux-chooser'"


# ---------------------------------------------
# fzf file picker popup (Ctrl+A t)
# Ctrl+G: show gitignored files | Ctrl+H: hide gitignored files
bind t run-shell "tmux display-popup -E -w 80% -h 80% '$XDG_BIN_HOME/tmux-fzf-picker \"#{pane_current_path}\" \"#{pane_id}\"'"

