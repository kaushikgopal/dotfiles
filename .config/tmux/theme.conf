# Catppuccin Mocha
# https://github.com/catppuccin/catppuccin
#
# Palette reference:
#   crust    #11111b    mantle   #181825    base     #1e1e2e
#   surface0 #313244    surface1 #45475a    surface2 #585b70
#   overlay0 #6c7086    overlay1 #7f849c    overlay2 #9399b2
#   subtext0 #a6adc8    subtext1 #bac2de    text     #cdd6f4
#   mauve    #cba6f7    green    #a6e3a1

# status bar (unset legacy options so they don't override status-style)
set -gu status-bg
set -gu status-fg
set -g status-style "bg=#1e1e2e,fg=#6c7086"
set -g status-left '#[fg=#11111b,bg=#cba6f7,bold] #S #[default] '
set -g status-right '#[fg=#a6adc8]#{s|/Users/kg|~|:pane_current_path} #[fg=#11111b,bg=#a6e3a1,bold] tmux #[fg=#11111b,bg=#585b70,bold] %d/%m #[fg=#11111b,bg=#6c7086,bold] %H:%M '

# window list (pane name shown when set via prefix + <)
set-window-option -g window-status-format '#[fg=#6c7086]#I #W#{?@pane_name, #[fg=#585b70]· #{@pane_name},}#[default]'
set-window-option -g window-status-current-format '#[fg=#cba6f7]#I #W#{?@pane_name, #[fg=#977fca]· #{@pane_name},}#[default]'

# pane borders
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"
