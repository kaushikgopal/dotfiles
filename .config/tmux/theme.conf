# Theme that follows the terminal palette via ANSI/default colors.

# status bar (unset legacy options so they don't override status-style)
set -gu status-bg
set -gu status-fg
set -g status-style "bg=default,fg=default"
set -g status-left '#[bold] #S #[default] '
set -g status-right '#[fg=default]#{s|/Users/kg|~|:pane_current_path} #[fg=#ffffff,bg=green,bold] tmux #[fg=#ffffff,bg=magenta,bold] %d/%m #[fg=#ffffff,bg=blue,bold] %H:%M '

# window list (pane name shown when set via prefix + <)
set-window-option -g window-status-format '#[fg=brightblack]#I #W#{?@pane_name, #[fg=black]· #{@pane_name},}#[default]'
set-window-option -g window-status-current-format '#[fg=cyan,bold]#I #W#{?@pane_name, #[fg=blue]· #{@pane_name},}#[default]'

# pane borders
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
