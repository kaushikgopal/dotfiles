# Theme that follows the terminal palette via ANSI/default colors.
#
# Dark/light switching uses tmux 3.6+ native hooks (client-dark-theme /
# client-light-theme). These fire when the terminal reports an appearance
# change via mode 2031 — Ghostty sends this automatically when macOS
# appearance toggles.
#
# Status-bar backgrounds use fixed 256-colour greys (not ANSI 0-15) so
# they work with any terminal theme without per-theme hex values.
#   colour235 = #262626  (subtle lift off Zenwritten Dark #191919 background)
#   colour254 = #e4e4e4  (subtle drop off most light backgrounds)

# status bar (unset legacy options so they don't override status-style)
set -gu status-bg
set -gu status-fg

# initial theme based on terminal state at load time
# if-shell -F evaluates at runtime (not parse-time like %if), so
# #{client_theme} resolves correctly on both fresh attach and reload.
if-shell -F '#{==:#{client_theme},light}' \
    'set -g status-style "bg=colour254,fg=default"' \
    'set -g status-style "bg=colour235,fg=default"'

# live-switch when appearance changes (no script, no polling)
set-hook -g client-dark-theme  'set -g status-style "bg=colour235,fg=default"'
set-hook -g client-light-theme 'set -g status-style "bg=colour254,fg=default"'
set -g status-left '#[bold] #S #[default] '
set -g status-right '#[fg=default]#{s|/Users/kg|~|:pane_current_path} #[fg=green,bold] tmux #[fg=magenta,bold] %d/%m #[fg=blue,bold] %H:%M '

# window list (pane name shown when set via prefix + <)
set-window-option -g window-status-format '#[fg=brightblack]⊙ #W#{?@pane_name, #[fg=black]· #{@pane_name},}#[default]'
set-window-option -g window-status-current-format '#[fg=cyan,bold]⊙ #W#{?@pane_name, #[fg=blue]· #{@pane_name},}#[default]'

# ── Two-line status bar ──────────────────────────────────
# Line 0 (top): sessions (left) + status info (right)
# Line 1 (bottom): windows only
set -g status 2
set -g 'status-format[0]' '#[align=left] #{S:#[fg=brightblack]#[range=session|#{session_id}] #{?session_alerts,#[underscore],}#{session_name}#{?session_alerts,#[nounderscore],} #[norange]#[default],#[fg=cyan]#[bold]#[range=session|#{session_id}] #{session_name} #[norange]#[default]}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'
set -g 'status-format[1]' '#[align=left list=on]  #[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}]#{?window_activity_flag,#[underscore],}#{?window_bell_flag,#[underscore],}#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{E:window-status-current-style}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}'

# pane borders
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
